<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Afri Fast" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=block" rel="stylesheet" />
    <title>%WEB_TITLE%</title>
    <style>
      @font-face {
        font-family: 'Ionicons';
        src: url('/fonts/Ionicons.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
    </style>
    <style id="expo-reset">
      html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; }
      body { touch-action: none; overscroll-behavior: none; }
      #root { display: flex; height: 100%; width: 100%; flex: 1; overflow: hidden; }
      html, body { font-family: 'Inter', sans-serif; }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        var isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isLocalhost) {
          // Dev mode: unregister any existing SW + clear caches so we never serve stale bundles
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
          if (window.caches) {
            caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); });
          }
        } else {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js').catch(function (err) {
              console.log('SW registration failed:', err);
            });
          });
        }
      }
    </script>
  </body>
</html>
